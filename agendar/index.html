<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Agendamento · Órbita</title>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/core/layout.css">
  <link rel="stylesheet" href="/agendar/agendar.css">
</head>
<body>
  <div class="public-container">
    <header class="public-header">
      <div class="logo-container">
        <span class="logo-orbita">ÓRBITA</span><span class="logo-fatec">FATEC</span>
      </div>
      <h2>Agendamento de Espaços</h2>
    </header>

    <main class="public-main">
      <div class="filters-area">
        <div class="filter-group">
          <label>Espaço:</label>
          <select id="select-local">
            <!-- Povoado por app.js via /api/locais -->
            <option value="">Carregando...</option>
          </select>
        </div>
      </div>

      <div id="calendar-container" class="calendar-container">
        <div class="calendar-header">
          <button id="btn-prev-month" class="btn-icon">&lt;</button>
          <h3 id="current-month-year">Mês Ano</h3>
          <button id="btn-next-month" class="btn-icon">&gt;</button>
        </div>
        <div class="calendar-grid">
          <div class="weekday">Dom</div>
          <div class="weekday">Seg</div>
          <div class="weekday">Ter</div>
          <div class="weekday">Qua</div>
          <div class="weekday">Qui</div>
          <div class="weekday">Sex</div>
          <div class="weekday">Sáb</div>
          <!-- Dias injetados dinamicamente -->
        </div>
      </div>

      <div class="events-list-container">
        <h3 id="events-day-title">Eventos do Dia</h3>
        <div id="events-list" class="events-list">
          <p class="empty-state">Selecione um dia no calendário</p>
        </div>
        <button id="btn-solicitar" class="btn-primary" style="width: 100%; margin-top: 1rem; display: none;">Solicitar Horário neste Dia</button>
      </div>
    </main>
  </div>

  <!-- Modal de Solicitação -->
  <div id="modal-solicitar" class="modal-overlay">
    <div class="modal-box">
      <h3 style="margin-bottom:0.5rem; font-weight: 800;">Nova Solicitação</h3>
      <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">
        Local: <span id="modal-local-nome" style="font-weight:700;"></span><br>
        Data: <span id="modal-data" style="font-weight:700;"></span>
      </p>

      <form id="form-solicitar" class="cadastro-form">
        <div class="form-group">
          <label>Seu Nome *</label>
          <input type="text" id="sol-nome" required placeholder="Digite seu nome completo">
        </div>
        <div class="form-group row">
          <div style="flex:1;">
            <label>Horário Início *</label>
            <input type="time" id="sol-hora-inicio" required>
          </div>
          <div style="flex:1;">
            <label>Horário Fim *</label>
            <input type="time" id="sol-hora-fim" required>
          </div>
        </div>
        <div class="form-group">
          <label>Nome do Evento *</label>
          <input type="text" id="sol-evento" required placeholder="Ex: Aula de Redes, Palestra...">
        </div>
        <div class="form-group">
          <label>Descrição do Evento</label>
          <textarea id="sol-descricao" rows="3" placeholder="Detalhes adicionais..."></textarea>
        </div>
        <div class="form-group">
          <label>Curso (Opcional)</label>
          <input type="text" id="sol-curso" placeholder="Ex: Gestão de T.I.">
        </div>

        <div class="form-actions" style="margin-top:2rem;">
          <button type="button" class="btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button type="submit" class="btn-primary">Enviar Solicitação</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/agendar/app.js"></script>
</body>
</html>
