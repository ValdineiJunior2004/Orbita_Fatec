<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações - Órbita FATEC</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <link rel="stylesheet" href="/core/layout.css">
    <link rel="stylesheet" href="/avaliacoes/avaliacoes.css">
</head>
<body>
    <!-- Auth Guard Padrão -->
    <div id="auth-guard" class="layout-auth-guard">
        <div class="layout-spinner"></div>
        <h3 style="color:var(--text-main); font-weight:600;">Autenticando...</h3>
    </div>

    <div id="app" class="layout-wrapper hidden">
        <!-- Sidebar injetada pelo layout.js -->
        
        <main class="layout-main">
            <!-- Header injetado pelo layout.js -->
            
            <div class="layout-content">
                <!-- Cabeçalho da Página -->
                <div class="page-header">
                    <div>
                        <h1 class="page-title">Avaliações</h1>
                        <p class="page-subtitle">Gerenciamento de provas, trabalhos e projetos acadêmicos</p>
                    </div>
                    <div class="page-header-actions">
                        <button class="btn-primary action-execute" id="btn-nova-avaliacao">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            Nova Avaliação
                        </button>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="filters-bar">
                    <div class="search-wrap">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="search-avaliacoes" class="search-input" placeholder="Buscar por título, turma ou curso...">
                    </div>
                    <select id="filter-turma" class="select-filter">
                        <option value="">Todas as Turmas</option>
                    </select>
                    <button class="btn-clear-filters hidden" id="btn-clear-filters" title="Limpar filtros">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        Limpar
                    </button>
                </div>

                <!-- Grid de Avaliações -->
                <div id="avaliacoes-list" class="avaliacoes-grid">
                    <div class="empty-state">
                        <p>Carregando avaliações...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Cadastro/Edição -->
    <div id="modal-avaliacao" class="modal-overlay hidden">
        <div class="modal-content modal-content-large">
            <h2 id="modal-title">Nova Avaliação</h2>
            <form id="form-avaliacao">
                <input type="hidden" id="avaliacao-id">
                
                <div class="form-group">
                    <label>Turma / Classe *</label>
                    <select id="avaliacao-turma" required>
                        <option value="">Selecione a turma...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Título / Nome da Avaliação *</label>
                    <input type="text" id="avaliacao-titulo" placeholder="Ex: Prova Escrita 1, Trabalho Prático" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Curso *</label>
                        <input type="text" id="avaliacao-curso" placeholder="Ex: ADS, DSM, GE" required>
                    </div>
                    <div class="form-group">
                        <label>Peso / Nota Máxima *</label>
                        <input type="number" id="avaliacao-peso" step="0.1" min="0.1" max="100" placeholder="Ex: 10.0" required>
                    </div>
                </div>

                <!-- Seção de Questões Dinâmicas -->
                <div class="questions-section">
                    <div class="questions-section-header">
                        <label>Questões da Avaliação</label>
                        <div class="questions-actions-btn-group">
                            <button type="button" class="btn-add-question" id="btn-add-escolha">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                + Múltipla Escolha
                            </button>
                            <button type="button" class="btn-add-question btn-add-descritiva" id="btn-add-descritiva">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                + Descritiva
                            </button>
                        </div>
                    </div>
                    <div id="questions-list-container" class="questions-list-container">
                        <!-- Questões renderizadas via Javascript -->
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="btn-cancelar-avaliacao">Cancelar</button>
                    <button type="submit" class="btn-primary" id="btn-salvar-avaliacao">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal de Gabaritos e Correção OMR -->
    <div id="modal-gabaritos" class="modal-overlay hidden">
        <div class="modal-content modal-content-large gabaritos-modal-container">
            <div class="gabaritos-modal-header">
                <h2 id="gabaritos-modal-title">Gabaritos e Correção</h2>
                <button type="button" class="btn-secondary" id="btn-fechar-gabaritos">Fechar</button>
            </div>
            
            <div class="gabaritos-modal-body">
                <!-- Painel Esquerdo: Alunos -->
                <div class="gabaritos-sidebar">
                    <button type="button" class="btn-primary btn-imprimir-tudo" id="btn-imprimir-gabaritos">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        Imprimir Folhas A4
                    </button>
                    <div class="gabaritos-sidebar-title">Alunos da Turma</div>
                    <div id="gabaritos-alunos-list" class="gabaritos-alunos-list">
                        <!-- Lista de alunos preenchida dinamicamente -->
                    </div>
                </div>
                
                <!-- Painel Direito: Área Principal do Scanner / Resultado -->
                <div class="gabaritos-main-panel" id="gabaritos-main-content">
                    <!-- Conteúdo dinâmico via app.js -->
                </div>
            </div>
        </div>
    </div>


    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/avaliacoes/app.js"></script>
</body>
</html>
